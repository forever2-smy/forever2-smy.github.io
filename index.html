<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的个人播客</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f2f2f2;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .section {
            margin: 30px 0;
        }
        h2 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #0066cc;
        }
        p {
            line-height: 1.6;
            color: #555;
            margin-bottom: 10px;
        }
        img {
            width: 100%;
            border-radius: 8px;
            margin: 10px 0 20px;
        }
        .audio-player {
            margin: 20px 0;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎧 我的个人播客网站</h1>

    <div class="section">
        <h2>一、绝对路径图片（网络地址）</h2>
        <p>图片来源于网络，使用完整 HTTP 地址引用：</p>
        <img src="https://picsum.photos/id/1025/800/400" alt="网络播客封面">
    </div>

    <div class="section">
        <h2>二、相对路径图片（本地文件）</h2>
        <p>图片存放在项目 images 文件夹内，使用相对路径引用：</p>
        <img src="./images/my-podcast.jpg" alt="本地个人照片">
    </div>

    <div class="section audio-player">
        <h2>三、播客播放</h2>
        <audio controls style="width:100%;">
            <source src="#" type="audio/mpeg">
            您的浏览器不支持音频播放
        
    </div>

    <div class="section">
        <h2>四、播客介绍</h2>
        <p>本播客主要分享编程学习、前端开发、Java Web 以及日常心得。</p>
        <p>本页面通过纯 HTML 编写，部署在 GitHub Pages 上。</p>
    </div>

    <footer>
        © 2026 我的个人播客 | 部署于 GitHub.io
    </footer>
</div>

</body>
</html>
