<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的个人播客</title>
    <style>
        body { font-family: Arial; background: #f7f7f7; padding: 30px; }
        .box { max-width: 700px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        h1 { color: #222; text-align: center; }
        h3 { margin-top: 25px; color: #0066cc; }
        img { width: 100%; border-radius: 8px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="box">
    <h1>🎧 我的个人播客</h1>
    <p>欢迎来到我的个人播客，分享学习、生活与技术～</p>

    <!-- 1. 绝对路径图片（网络地址） -->
    <h3>① 绝对路径图片（网络地址）</h3>
    <p>图片来源于网络，引用完整 HTTP 地址。</p>
    <img src="https://picsum.photos/id/1025/800/400" alt="播客封面">

    <!-- 2. 相对路径图片（本地文件夹） -->
    <h3>② 相对路径图片（本地文件夹）</h3>
    <p>图片存放在 images 文件夹，使用相对路径引用。</p>
    <img src="./images/my-podcast.jpg" alt="本地照片">

    <!-- 3. 播客介绍 -->
    <h3>🎵 播客简介</h3>
    <p>本播客主要分享编程学习、前端开发以及日常心得。</p>
    <p>本页面通过纯 HTML 编写，部署在 GitHub Pages 上。</p>

    <br><br>
    <p style="text-align:center; color:#666;">© 2026 我的个人播客</p>
</div>

</body>
</html>
